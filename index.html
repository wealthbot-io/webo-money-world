<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webo's Money World</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<!-- Alpine.js is self-hosted (vendored) so the app never depends on a third-party
     CDN being reachable. A blocked/slow CDN previously made every Alpine-bound
     element (Webo, lessons, dots, stars) vanish on load. -->
<script defer src="/vendor/alpine-3.14.1.min.js"></script>
<style>
  :root {
    --navy-deep: #0a1628;
    --navy: #0e1d33;
    --navy-card: #14263f;
    --navy-line: #1f3a5c;
    --orange: #f5a623;
    --orange-bright: #ffb938;
    --orange-deep: #e08e0b;
    --teal: #4fd1c5;
    --teal-glow: #6ee7db;
    --cream: #f5e6c8;
    --text: #eaf2ff;
    --text-dim: #9fb4d4;
    --green: #5ed47a;
    --red: #ff7b6b;
    --purple: #9d7bea;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  [x-cloak] { display: none !important; }

  html, body {
    background: var(--navy-deep);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    overflow-x: hidden;
  }

  body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(79,209,197,0.10), transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 90%, rgba(245,166,35,0.08), transparent 60%),
      var(--navy-deep);
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
    /* room for the fixed "Ask Webo" FAB so it never overlaps the last lesson card */
    padding-bottom: 110px;
  }

  /* ---------- Header ---------- */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px 12px;
  }
  .brand { display: flex; align-items: center; gap: 9px; }
  .brand-mark {
    width: 30px; height: 30px; border-radius: 7px;
    background: var(--text); display: grid; place-items: center;
  }
  .brand-mark svg { width: 20px; height: 20px; }
  .brand-name { font-family: 'Baloo 2'; font-weight: 700; font-size: 16px; letter-spacing: .2px; }
  .brand-name span { color: var(--orange); }
  .star-count {
    display: flex; align-items: center; gap: 5px;
    background: var(--navy-card); border: 1px solid var(--navy-line);
    padding: 6px 11px; border-radius: 20px; font-weight: 800; font-size: 13px;
  }
  .star-count svg { width: 15px; height: 15px; }

  /* ---------- World / Hub ---------- */
  .world {
    margin: 6px 16px 0;
    background:
      radial-gradient(ellipse at 50% 120%, rgba(79,209,197,0.12), transparent 70%),
      linear-gradient(180deg, var(--navy-card), var(--navy));
    border: 1px solid var(--navy-line);
    border-radius: 26px;
    padding: 18px 18px 22px;
    position: relative;
    overflow: hidden;
  }
  .world-stars { position: absolute; inset: 0; pointer-events: none; }
  .world-stars i {
    position: absolute; width: 2px; height: 2px; border-radius: 50%;
    background: #cfe3ff; opacity: .5; animation: twinkle 3s infinite ease-in-out;
  }
  @keyframes twinkle { 0%,100%{opacity:.2} 50%{opacity:.8} }

  .world-title {
    font-family: 'Baloo 2'; font-weight: 700; font-size: 13px;
    color: var(--text-dim); text-align: center; letter-spacing: 1.5px; text-transform: uppercase;
    margin-bottom: 4px;
  }
  .world-stage {
    height: 220px; position: relative; display: grid; place-items: end center;
  }

  /* ground */
  .ground {
    position: absolute; bottom: 0; left: -10px; right: -10px; height: 60px;
    background: linear-gradient(180deg, #163152, #0e2138);
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    border-top: 2px solid var(--navy-line);
  }

  /* world props that fill in */
  .prop {
    position: absolute; bottom: 38px;
    opacity: 0; transform: translateY(14px) scale(.6);
    transition: opacity .6s ease, transform .6s cubic-bezier(.34,1.56,.64,1);
  }
  .prop.on { opacity: 1; transform: translateY(0) scale(1); }

  .prop-jars { left: 14px; }
  .jar { width: 22px; height: 30px; display: inline-block; margin: 0 1px; position: relative; vertical-align: bottom;
    border: 2px solid var(--cream); border-top: none; border-radius: 4px 4px 7px 7px; }
  .jar::after { content:""; position:absolute; left:1px; right:1px; bottom:1px; height: 55%;
    border-radius: 3px; }
  .jar.spend::after { background: var(--red); }
  .jar.save::after { background: var(--teal); }
  .jar.grow::after { background: var(--green); }
  .jar::before { content:""; position:absolute; top:-5px; left:-3px; right:-3px; height:5px;
    background: var(--cream); border-radius: 3px; }

  .prop-tree { right: 22px; bottom: 36px; }
  .prop-tree svg { width: 78px; height: 110px; display: block; }

  .prop-rocket { left: 50%; transform: translateX(-50%) translateY(14px) scale(.6); bottom: 150px; }
  .prop-rocket.on { transform: translateX(-50%) translateY(0) scale(1); }
  .prop-rocket svg { width: 40px; height: 64px; filter: drop-shadow(0 0 12px rgba(245,166,35,.5)); }
  .prop-rocket .flame { transform-origin: 50% 0; animation: flicker .35s infinite alternate; }
  @keyframes flicker { from{transform:scaleY(.8)} to{transform:scaleY(1.15)} }

  .prop-basket { right: 24%; bottom: 40px; }
  .prop-basket svg { width: 64px; height: 56px; filter: drop-shadow(0 6px 10px rgba(0,0,0,.4)); }

  /* ---------- Webo character (pure CSS/SVG) ---------- */
  .webo { width: 120px; position: relative; z-index: 3; margin-bottom: 30px;
    animation: bob 3.4s ease-in-out infinite; cursor: pointer; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
  .webo svg { width: 100%; display: block; filter: drop-shadow(0 10px 18px rgba(0,0,0,.45)); }
  .webo .eye { animation: blink 4.5s infinite; transform-origin: center; }
  @keyframes blink { 0%,94%,100%{transform:scaleY(1)} 97%{transform:scaleY(.1)} }
  .webo-glow { position: absolute; inset: -10% 10% 20%; border-radius: 50%;
    background: radial-gradient(circle, rgba(245,166,35,.25), transparent 70%); z-index: -1;
    filter: blur(6px); }

  .webo-hint {
    text-align: center; font-size: 12px; color: var(--text-dim); margin-top: 18px;
    font-weight: 700; position: relative; z-index: 4;
  }

  /* ---------- Progress dots ---------- */
  .progress {
    display: flex; justify-content: center; gap: 8px; margin: 18px 0 6px;
  }
  .progress .dot {
    width: 9px; height: 9px; border-radius: 50%; background: var(--navy-line);
    transition: all .3s;
  }
  .progress .dot.done { background: var(--orange); box-shadow: 0 0 8px rgba(245,166,35,.6); }

  /* ---------- Lesson cards ---------- */
  .section-label {
    font-family: 'Baloo 2'; font-weight: 700; font-size: 12px; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--text-dim); margin: 22px 22px 10px;
  }
  .lessons { display: flex; flex-direction: column; gap: 12px; padding: 0 16px; }
  .lesson-card {
    display: flex; align-items: center; gap: 14px;
    background: var(--navy-card); border: 1px solid var(--navy-line);
    border-radius: 18px; padding: 14px 15px; cursor: pointer;
    transition: transform .18s ease, border-color .18s, box-shadow .18s;
    position: relative; overflow: hidden;
  }
  .lesson-card:active { transform: scale(.985); }
  .lesson-card:hover { border-color: var(--orange); box-shadow: 0 6px 24px rgba(0,0,0,.3); }
  .lesson-card.locked { opacity: .5; cursor: not-allowed; }
  .lesson-card.locked:hover { border-color: var(--navy-line); box-shadow: none; }
  .lesson-card.complete::before {
    content:""; position:absolute; inset:0; border-radius:18px;
    background: linear-gradient(90deg, rgba(94,212,122,.10), transparent 60%);
  }
  .lesson-ico {
    width: 50px; height: 50px; border-radius: 14px; flex-shrink: 0;
    display: grid; place-items: center; font-size: 26px;
    background: linear-gradient(145deg, var(--navy-line), var(--navy));
  }
  .lesson-body { flex: 1; min-width: 0; }
  .lesson-no { font-size: 11px; font-weight: 800; color: var(--orange); letter-spacing: .5px; }
  .lesson-name { font-family: 'Baloo 2'; font-weight: 700; font-size: 16.5px; line-height: 1.15; }
  .lesson-sub { font-size: 12.5px; color: var(--text-dim); margin-top: 2px; }
  .lesson-status { flex-shrink: 0; }
  .lesson-status svg { width: 24px; height: 24px; }

  /* ---------- Lesson overlay ---------- */
  /* ---------- Lesson scaffold: a reusable 3-region template ----------
     Every lesson uses the SAME structure so regions never conflict:
       .lesson-top     (header) -> fixed, never scrolls
       .lesson-scroll  (body)   -> flexes + scrolls; holds intro / stage / feedback
       .lesson-actions (footer) -> pinned to the bottom; the primary button lives here
     A new lesson only has to fill these regions. */
  .overlay {
    position: fixed; inset: 0; z-index: 50; display: none;
    background: var(--navy-deep);
    max-width: 480px; margin: 0 auto;
  }
  .overlay.show { display: flex; flex-direction: column; animation: slideUp .35s ease; }
  @keyframes slideUp { from{transform:translateY(30px); opacity:0} to{transform:translateY(0); opacity:1} }

  .lesson-top {
    flex: 0 0 auto; z-index: 5;
    display: flex; align-items: center; gap: 12px;
    padding: 16px 18px; background: rgba(10,22,40,.85); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--navy-line);
  }
  .back-btn {
    width: 36px; height: 36px; border-radius: 11px; border: 1px solid var(--navy-line);
    background: var(--navy-card); color: var(--text); display: grid; place-items: center;
    cursor: pointer; font-size: 18px; flex-shrink: 0;
  }
  .lesson-top h2 { font-family: 'Baloo 2'; font-weight: 700; font-size: 17px; }

  /* Region 2: scrollable body. Lays its sub-regions out top-to-bottom.
     (Named .lesson-scroll, not .lesson-body, to avoid colliding with the
     lesson-card text column which already uses .lesson-body.) */
  .lesson-scroll {
    flex: 1 1 auto; overflow-y: auto;
    padding: 20px 20px 16px;
    display: flex; flex-direction: column;
  }
  /* Designated sub-regions every lesson fills, stacked in visual order:
     .lesson-intro (Webo speech) -> .lesson-stage (interactive game) -> .feedback (tip). */
  .lesson-intro { flex: 0 0 auto; }
  /* The interactive game; sizes to its content. Top padding gives variable-height
     stage content reliable clearance from the intro/header above it. */
  .lesson-stage { flex: 0 0 auto; padding-top: 8px; }

  /* Region 3: pinned action footer. Primary button is always visible here. */
  .lesson-actions {
    flex: 0 0 auto;
    padding: 14px 20px calc(14px + env(safe-area-inset-bottom, 0px));
    border-top: 1px solid var(--navy-line);
    background: rgba(10,22,40,.92); backdrop-filter: blur(10px);
  }
  .lesson-actions:empty { display: none; }
  .lesson-actions .btn { margin-top: 0; }

  .speech {
    display: flex; gap: 12px; align-items: flex-start; margin-bottom: 22px;
  }
  .speech .mini-webo { width: 52px; flex-shrink: 0; }
  .speech .mini-webo svg { width: 100%; }
  .bubble {
    background: var(--navy-card); border: 1px solid var(--navy-line);
    border-radius: 4px 16px 16px 16px; padding: 13px 15px; font-size: 15px;
    line-height: 1.5; font-weight: 600;
  }

  .step-img { text-align: center; margin: 8px 0 20px; }

  h3.q { font-family: 'Baloo 2'; font-weight: 700; font-size: 19px; margin-bottom: 14px; text-align: center; }

  .btn {
    width: 100%; border: none; border-radius: 15px; padding: 15px;
    font-family: 'Baloo 2'; font-weight: 700; font-size: 16px; cursor: pointer;
    background: linear-gradient(145deg, var(--orange-bright), var(--orange-deep));
    color: #2a1a00; box-shadow: 0 6px 16px rgba(245,166,35,.3);
    transition: transform .15s; margin-top: 8px;
  }
  .btn:active { transform: scale(.97); }
  .btn.ghost { background: var(--navy-card); color: var(--text); border: 1px solid var(--navy-line); box-shadow: none; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  .choices { display: flex; flex-direction: column; gap: 10px; margin: 4px 0 8px; }
  .choice {
    border: 1.5px solid var(--navy-line); background: var(--navy-card); color: var(--text);
    border-radius: 14px; padding: 15px; font-size: 15px; font-weight: 700; cursor: pointer;
    text-align: left; transition: all .15s; font-family: 'Nunito';
  }
  .choice:hover { border-color: var(--orange); }
  .choice.correct { border-color: var(--green); background: rgba(94,212,122,.12); }
  .choice.wrong { border-color: var(--red); background: rgba(255,123,107,.12); }

  .feedback {
    border-radius: 14px; padding: 14px; font-size: 14.5px; font-weight: 600; line-height: 1.5;
    margin-top: 12px; display: none;
  }
  .feedback.show { display: block; animation: slideUp .3s; }
  .feedback.good { background: rgba(94,212,122,.10); border: 1px solid rgba(94,212,122,.4); }
  .feedback.info { background: rgba(79,209,197,.10); border: 1px solid rgba(79,209,197,.4); }

  /* Jars interactive */
  .jar-game { display: flex; justify-content: space-around; gap: 8px; margin: 4px 0 16px; }
  .jar-col { flex: 1; text-align: center; }
  .jar-big {
    height: 120px; border: 3px solid var(--cream);
    border-radius: 14px; position: relative; overflow: hidden;
    background: rgba(255,255,255,.03); cursor: pointer; transition: transform .12s;
  }
  .jar-big:active { transform: scale(.96); }
  .jar-fill { position: absolute; bottom: 0; left: 0; right: 0; transition: height .4s cubic-bezier(.34,1.56,.64,1); }
  .jar-col.spend .jar-fill { background: linear-gradient(var(--red), #d9594a); }
  .jar-col.save .jar-fill { background: linear-gradient(var(--teal), #2fb3a8); }
  .jar-col.grow .jar-fill { background: linear-gradient(var(--green), #3fae5c); }
  .jar-label { font-family: 'Baloo 2'; font-weight: 700; font-size: 13px; margin-top: 8px; }
  .jar-amt { font-size: 12px; color: var(--text-dim); font-weight: 700; }
  .coins-left { text-align: center; font-family: 'Baloo 2'; font-weight: 700; font-size: 15px; margin-bottom: 24px; }
  .coins-left b { color: var(--orange); font-size: 20px; }

  /* Penny slider */
  .penny-display { text-align: center; margin: 10px 0 6px; }
  .penny-day { font-size: 13px; color: var(--text-dim); font-weight: 700; }
  .penny-val { font-family: 'Baloo 2'; font-weight: 800; font-size: 42px; color: var(--orange);
    line-height: 1.1; transition: color .3s; }
  .penny-vs { font-size: 13px; color: var(--text-dim); margin-top: 4px; font-weight: 700; }
  input[type=range] { width: 100%; margin: 18px 0 6px; accent-color: var(--orange); height: 6px; }
  .penny-bar-wrap { height: 90px; display: flex; align-items: flex-end; gap: 3px; margin: 14px 0; }
  .penny-bar { flex: 1; background: linear-gradient(var(--orange-bright), var(--orange-deep));
    border-radius: 3px 3px 0 0; min-height: 2px; transition: height .2s; opacity: .85; }

  /* Seeds game */
  .seed-field { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin: 6px 0 14px; }
  .seed {
    aspect-ratio: 1; border-radius: 16px; border: 1.5px solid var(--navy-line);
    background: var(--navy-card); display: grid; place-items: center; font-size: 30px;
    cursor: pointer; transition: all .2s; position: relative;
  }
  .seed:active { transform: scale(.93); }
  .seed.planted { cursor: default; }
  .seed.grown { border-color: var(--green); background: rgba(94,212,122,.12); }
  .seed.failed { border-color: var(--red); background: rgba(255,123,107,.10); opacity: .7; }
  .seed.slow { border-color: var(--teal); background: rgba(79,209,197,.10); }

  /* Needs vs Wants */
  .nw-progress { text-align: center; font-family: 'Baloo 2'; font-weight: 700; font-size: 13px; color: var(--text-dim); margin-bottom: 12px; }
  .nw-item { text-align: center; font-size: 72px; line-height: 1; margin: 6px 0 18px; }
  .nw-name { font-family: 'Baloo 2'; font-weight: 700; font-size: 18px; color: var(--text); margin-top: 8px; }
  .nw-choices { display: flex; gap: 12px; margin-bottom: 4px; }
  .nw-choices .choice { flex: 1; text-align: center; font-family: 'Baloo 2'; }

  /* Reward modal */
  .reward {
    position: fixed; inset: 0; z-index: 80; display: none;
    background: rgba(5,12,24,.8); backdrop-filter: blur(6px);
    align-items: center; justify-content: center; padding: 30px;
  }
  .reward.show { display: flex; animation: slideUp .3s; }
  .reward-card {
    background: linear-gradient(160deg, var(--navy-card), var(--navy));
    border: 1px solid var(--orange); border-radius: 26px; padding: 30px 26px;
    text-align: center; max-width: 360px; width: 100%;
    box-shadow: 0 0 50px rgba(245,166,35,.25);
  }
  .reward-card .big-webo { width: 110px; margin: 0 auto 6px; animation: bob 3s ease-in-out infinite; }
  .reward-card .big-webo svg { width: 100%; }
  .reward-card h2 { font-family: 'Baloo 2'; font-weight: 800; font-size: 24px; margin-bottom: 6px; }
  .reward-card p { font-size: 14.5px; color: var(--text-dim); font-weight: 600; line-height: 1.5; margin-bottom: 8px; }
  .reward-stars { font-size: 30px; margin: 10px 0 18px; letter-spacing: 6px; }
  .confetti { position: fixed; top: -10px; width: 9px; height: 14px; z-index: 90; pointer-events: none; }

  /* Ask Webo chat */
  .ask-fab {
    /* Sit in the right gutter BESIDE the 480px column on desktop (240px half-column
       + 72px gap); clamp to 16px from the edge on narrow screens where there is no gutter. */
    position: fixed; bottom: 20px; right: max(16px, calc(50% - 312px)); z-index: 40;
    background: linear-gradient(145deg, var(--orange-bright), var(--orange-deep));
    color: #2a1a00; border: none; border-radius: 26px; padding: 13px 18px 13px 14px;
    font-family: 'Baloo 2'; font-weight: 700; font-size: 14px; cursor: pointer;
    display: flex; align-items: center; gap: 8px; box-shadow: 0 8px 22px rgba(245,166,35,.4);
    animation: bob 3.4s ease-in-out infinite;
  }
  @media (max-width: 480px){ .ask-fab { right: 16px; } }
  .ask-fab .fab-webo { width: 30px; height: 30px; }
  .ask-fab .fab-webo svg { width: 100%; }

  .chat {
    position: fixed; inset: 0; z-index: 70; display: none;
    max-width: 480px; margin: 0 auto; flex-direction: column;
    background: var(--navy-deep);
  }
  .chat.show { display: flex; animation: slideUp .3s; }
  .chat-head {
    display: flex; align-items: center; gap: 12px; padding: 16px 18px;
    border-bottom: 1px solid var(--navy-line); background: var(--navy);
  }
  .chat-head .mini-webo { width: 40px; }
  .chat-head .mini-webo svg { width: 100%; }
  .chat-head .ch-name { font-family: 'Baloo 2'; font-weight: 700; font-size: 16px; }
  .chat-head .ch-sub { font-size: 11.5px; color: var(--teal); font-weight: 700; }
  .chat-head .close-x { margin-left: auto; width: 34px; height: 34px; border-radius: 10px;
    border: 1px solid var(--navy-line); background: var(--navy-card); color: var(--text);
    cursor: pointer; font-size: 18px; }
  .chat-log { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 82%; padding: 12px 14px; border-radius: 16px; font-size: 14.5px; line-height: 1.5; font-weight: 600; }
  .msg.bot { align-self: flex-start; background: var(--navy-card); border: 1px solid var(--navy-line); border-radius: 4px 16px 16px 16px; }
  .msg.me { align-self: flex-end; background: linear-gradient(145deg, var(--orange-bright), var(--orange-deep)); color: #2a1a00; border-radius: 16px 16px 4px 16px; }
  .typing span { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); margin: 0 1px; animation: typing 1.2s infinite; }
  .typing span:nth-child(2){ animation-delay:.2s } .typing span:nth-child(3){ animation-delay:.4s }
  @keyframes typing { 0%,60%,100%{transform:translateY(0); opacity:.4} 30%{transform:translateY(-5px); opacity:1} }
  .chat-suggest { display: flex; gap: 8px; padding: 0 14px 10px; overflow-x: auto; }
  .chat-suggest button { white-space: nowrap; border: 1px solid var(--navy-line); background: var(--navy-card);
    color: var(--text-dim); border-radius: 16px; padding: 8px 13px; font-size: 12.5px; font-weight: 700; cursor: pointer; flex-shrink: 0; }
  .chat-input { display: flex; gap: 9px; padding: 12px 14px; border-top: 1px solid var(--navy-line); background: var(--navy); }
  .chat-input input { flex: 1; background: var(--navy-card); border: 1px solid var(--navy-line);
    border-radius: 14px; padding: 13px 15px; color: var(--text); font-size: 15px; font-family: 'Nunito'; font-weight: 600; }
  .chat-input input:focus { outline: none; border-color: var(--orange); }
  .chat-input button { width: 48px; border: none; border-radius: 14px; cursor: pointer;
    background: linear-gradient(145deg, var(--orange-bright), var(--orange-deep)); color: #2a1a00; font-size: 18px; }
  .chat-input button:disabled { opacity: .4; }

  .footer-note { text-align: center; font-size: 11px; color: var(--text-dim); opacity: .6; padding: 22px 30px 8px; line-height: 1.5; }
</style>
</head>
<body>
<div class="app" x-data="weboWorld()" x-init="init()">

  <header>
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="3" r="1.6" fill="#0a1628"/><rect x="11.3" y="4" width="1.4" height="3" fill="#0a1628"/><rect x="5" y="7" width="14" height="13" rx="2" fill="#0a1628"/><circle cx="9" cy="11.5" r="1.4" fill="#fff"/><circle cx="15" cy="11.5" r="1.4" fill="#fff"/><path d="M8 16 L12 19 L16 16" stroke="#fff" stroke-width="1.6" fill="none"/></svg>
      </div>
      <div class="brand-name">webo's <span>money world</span></div>
    </div>
    <div class="star-count">
      <svg viewBox="0 0 24 24" fill="#f5a623"><path d="M12 2l2.9 6.1 6.6.9-4.8 4.6 1.2 6.6L12 18.6 6.1 20.2l1.2-6.6L2.5 9l6.6-.9z"/></svg>
      <span x-text="stars">0</span>
    </div>
  </header>

  <!-- WORLD HUB -->
  <div class="world">
    <div class="world-stars" x-ref="worldStars"></div>
    <div class="world-title">Webo's World</div>
    <div class="world-stage">
      <!-- props fill in, driven by state -->
      <div class="prop prop-jars" :class="{ on: lessons[0].completed }">
        <span class="jar spend"></span><span class="jar save"></span><span class="jar grow"></span>
      </div>
      <div class="prop prop-tree" :class="{ on: lessons[1].completed }">
        <svg viewBox="0 0 78 110">
          <rect x="34" y="60" width="10" height="48" rx="3" fill="#7a5230"/>
          <circle cx="39" cy="40" r="26" fill="#3fae5c"/>
          <circle cx="22" cy="50" r="17" fill="#5ed47a"/>
          <circle cx="56" cy="50" r="17" fill="#5ed47a"/>
          <circle cx="39" cy="30" r="18" fill="#6ee0a0"/>
          <circle cx="28" cy="38" r="3" fill="#f5a623"/><circle cx="50" cy="35" r="3" fill="#f5a623"/><circle cx="40" cy="52" r="3" fill="#f5a623"/>
        </svg>
      </div>
      <div class="prop prop-rocket" :class="{ on: lessons[2].completed }">
        <svg viewBox="0 0 40 64">
          <path d="M20 2 C30 12 30 30 28 44 L12 44 C10 30 10 12 20 2Z" fill="#f5e6c8"/>
          <circle cx="20" cy="22" r="6" fill="#14263f" stroke="#4fd1c5" stroke-width="2"/>
          <path d="M12 40 L4 52 L12 48Z" fill="#e08e0b"/>
          <path d="M28 40 L36 52 L28 48Z" fill="#e08e0b"/>
          <g class="flame"><path d="M14 46 L20 62 L26 46Z" fill="#ffb938"/><path d="M16 46 L20 56 L24 46Z" fill="#ff7b6b"/></g>
        </svg>
      </div>
      <div class="prop prop-basket" :class="{ on: lessons[3].completed }">
        <svg viewBox="0 0 70 60">
          <circle cx="28" cy="22" r="8" fill="#ff7b6b"/>
          <circle cx="44" cy="20" r="9" fill="#5ed47a"/>
          <rect x="33" y="12" width="6" height="14" rx="3" fill="#f5a623"/>
          <path d="M14 28 L56 28 L50 56 L20 56 Z" fill="#b9762e"/>
          <path d="M13 28 L57 28 L55 34 L15 34 Z" fill="#e08e0b"/>
          <path d="M22 38 L48 38 M21 46 L49 46" stroke="#8a5620" stroke-width="2" fill="none"/>
          <path d="M22 28 Q35 8 48 28" stroke="#8a5620" stroke-width="3" fill="none"/>
        </svg>
      </div>

      <!-- WEBO -->
      <div class="webo" @click="tapWebo($el)" title="Tap me!">
        <div class="webo-glow"></div>
        <div x-html="weboSvg"></div>
      </div>
      <div class="ground"></div>
    </div>
    <div class="webo-hint" x-text="hint">Tap Webo to say hi!</div>
    <div class="progress">
      <template x-for="(l, i) in lessons" :key="l.id">
        <div class="dot" :class="{ done: l.completed }"></div>
      </template>
    </div>
  </div>

  <div class="section-label">Today's Lessons</div>
  <div class="lessons" x-cloak>
    <template x-for="(l, i) in lessons" :key="l.id">
      <div class="lesson-card"
           :class="{ locked: isLocked(i), complete: l.completed }"
           @click="openLesson(i)">
        <div class="lesson-ico" x-text="l.icon"></div>
        <div class="lesson-body">
          <div class="lesson-no" x-text="l.no"></div>
          <div class="lesson-name" x-text="l.name"></div>
          <div class="lesson-sub" x-text="l.sub"></div>
        </div>
        <div class="lesson-status" x-html="statusIcon(i)"></div>
      </div>
    </template>
  </div>

  <div class="footer-note">
    A free financial-literacy demo from wealthbot.io. For learning only. No real money, no investment advice.
  </div>

  <!-- LESSON OVERLAY -->
  <div class="overlay" :class="{ show: overlayOpen }" x-cloak>
    <div class="lesson-top">
      <button class="back-btn" @click="closeOverlay()">&larr;</button>
      <h2 x-text="overlayTitle">Lesson</h2>
    </div>
    <div class="lesson-scroll" x-ref="ovBody"></div>
    <div class="lesson-actions" x-ref="ovActions"></div>
  </div>

  <!-- REWARD -->
  <div class="reward" :class="{ show: rewardOpen }" x-cloak>
    <div class="reward-card">
      <div class="big-webo" x-html="weboSvg"></div>
      <h2 x-text="rewardTitle">Awesome!</h2>
      <p x-html="rewardText"></p>
      <div class="reward-stars">&#11088;&#11088;&#11088;</div>
      <button class="btn" @click="rewardOpen = false">Back to World</button>
    </div>
  </div>

  <!-- ASK WEBO FAB -->
  <button class="ask-fab" @click="openChat()" x-show="!overlayOpen && !chatOpen" x-cloak>
    <span class="fab-webo" x-html="weboSvg"></span> Ask Webo
  </button>

  <!-- CHAT -->
  <div class="chat" :class="{ show: chatOpen }" x-cloak>
    <div class="chat-head">
      <span class="mini-webo" x-html="weboSvg"></span>
      <div>
        <div class="ch-name">Webo</div>
        <div class="ch-sub">&#9679; your money buddy</div>
      </div>
      <button class="close-x" @click="chatOpen = false">&#10005;</button>
    </div>
    <div class="chat-log" x-ref="chatLog">
      <template x-for="(m, i) in messages" :key="i">
        <div class="msg" :class="m.who" x-html="m.html"></div>
      </template>
      <div class="msg bot typing" x-show="chatBusy"><span></span><span></span><span></span></div>
    </div>
    <div class="chat-suggest" x-show="!hasAsked()">
      <template x-for="s in suggestions" :key="s">
        <button @click="sendChat(s)" x-text="s"></button>
      </template>
    </div>
    <div class="chat-input">
      <input x-model="chatInput" @keydown.enter="sendChat()"
             placeholder="Ask Webo anything about money..." autocomplete="off" :disabled="chatBusy">
      <button @click="sendChat()" :disabled="chatBusy">&#10148;</button>
    </div>
  </div>

</div>

<script>
function weboWorld() {
  return {
    // ---------- shared Webo SVG (string, reused in several spots) ----------
    weboSvg: `<svg viewBox="0 0 140 170">
      <line x1="70" y1="14" x2="70" y2="30" stroke="#e08e0b" stroke-width="4"/>
      <circle cx="70" cy="9" r="6" fill="#ffb938"/>
      <rect x="38" y="28" width="64" height="54" rx="18" fill="#f5a623"/>
      <rect x="46" y="36" width="48" height="38" rx="13" fill="#14263f"/>
      <circle class="eye" cx="60" cy="55" r="6.5" fill="#4fd1c5"/>
      <circle class="eye" cx="80" cy="55" r="6.5" fill="#4fd1c5"/>
      <circle cx="62" cy="53" r="2" fill="#eaf2ff"/><circle cx="82" cy="53" r="2" fill="#eaf2ff"/>
      <path d="M62 66 Q70 72 78 66" stroke="#4fd1c5" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <rect x="32" y="46" width="8" height="18" rx="4" fill="#e08e0b"/>
      <rect x="100" y="46" width="8" height="18" rx="4" fill="#e08e0b"/>
      <rect x="44" y="84" width="52" height="50" rx="16" fill="#f5a623"/>
      <rect x="52" y="92" width="36" height="34" rx="11" fill="#f5e6c8"/>
      <rect x="28" y="90" width="12" height="34" rx="6" fill="#e08e0b"/>
      <rect x="100" y="90" width="12" height="34" rx="6" fill="#e08e0b"/>
      <rect x="54" y="132" width="13" height="26" rx="6" fill="#e08e0b"/>
      <rect x="73" y="132" width="13" height="26" rx="6" fill="#e08e0b"/>
    </svg>`,

    // ---------- single source of truth (persisted) ----------
    // To add a 4th lesson: add one entry here, one flow fn (flowFor maps id -> fn),
    // and one prop div bound to lessons[3].completed. Nothing else changes.
    lessons: [
      { id: 'jars',  no: 'LESSON 1', name: 'The Three Jars',  sub: 'Earning, spending & saving', icon: '\u{1FAD9}', completed: false },
      { id: 'penny', no: 'LESSON 2', name: 'The Magic Penny', sub: 'How money grows over time',  icon: '\u{1FA99}', completed: false },
      { id: 'seeds', no: 'LESSON 3', name: 'Planting Seeds',  sub: 'Why we spread money around', icon: '\u{1F331}', completed: false },
      { id: 'needs', no: 'LESSON 4', name: 'Needs vs Wants',  sub: 'What we must have vs what is nice', icon: '\u{1F9FA}', completed: false },
    ],

    STORAGE_KEY: 'webo-money-world.v1',

    // ---------- transient UI state ----------
    hint: 'Tap Webo to say hi!',
    overlayOpen: false, overlayTitle: '', currentLesson: 0,
    rewardOpen: false, rewardTitle: '', rewardText: '',
    chatOpen: false, chatBusy: false, chatInput: '',
    chatHistory: [],   // [{role, content}] sent to the backend for context
    messages: [],      // [{who:'bot'|'me', html}] rendered in the log
    suggestions: ['Why does money grow?', 'What is saving?', 'Is it bad to spend money?', 'What is a stock?'],

    // ---------- derived ----------
    get stars() { return this.lessons.filter(l => l.completed).length; },
    isLocked(i) { return i > 0 && !this.lessons[i - 1].completed; },
    hasAsked() { return this.messages.some(m => m.who === 'me'); },

    // ---------- lifecycle ----------
    init() {
      this.load();
      this.seedStars();
    },

    load() {
      try {
        const raw = localStorage.getItem(this.STORAGE_KEY);
        if (!raw) return;
        const saved = JSON.parse(raw);
        if (saved && Array.isArray(saved.lessons)) {
          saved.lessons.forEach(sl => {
            const l = this.lessons.find(x => x.id === sl.id);
            if (l) l.completed = !!sl.completed;
          });
        }
      } catch (e) { /* corrupt storage -> start fresh, never throw at a child */ }
    },

    save() {
      try {
        localStorage.setItem(this.STORAGE_KEY, JSON.stringify({
          stars: this.stars,
          lessons: this.lessons.map(l => ({ id: l.id, completed: l.completed })),
        }));
      } catch (e) { /* private mode / quota -> progress just will not persist */ }
    },

    seedStars() {
      const c = this.$refs.worldStars;
      for (let i = 0; i < 26; i++) {
        const s = document.createElement('i');
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 70 + '%';
        s.style.animationDelay = Math.random() * 3 + 's';
        c.appendChild(s);
      }
    },

    statusIcon(i) {
      if (this.lessons[i].completed)
        return '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" fill="#5ed47a"/><path d="M7 12l3.5 3.5L17 9" stroke="#0a1628" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      if (this.isLocked(i))
        return '<svg viewBox="0 0 24 24" fill="#9fb4d4"><path d="M12 2a5 5 0 00-5 5v3H6a2 2 0 00-2 2v8a2 2 0 002 2h12a2 2 0 002-2v-8a2 2 0 00-2-2h-1V7a5 5 0 00-5-5zm3 8H9V7a3 3 0 016 0z"/></svg>';
      return '<svg viewBox="0 0 24 24" fill="none" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>';
    },

    // ---------- lesson navigation ----------
    openLesson(i) {
      if (this.isLocked(i)) return;
      this.currentLesson = i;
      this.overlayTitle = this.lessons[i].name;
      this.overlayOpen = true;
      this.$nextTick(() => {
        const flow = { jars: this.lessonJars, penny: this.lessonPenny, seeds: this.lessonSeeds, needs: this.lessonNeeds }[this.lessons[i].id];
        flow.call(this);
      });
    },
    closeOverlay() { this.overlayOpen = false; },

    // Render one lesson "screen" into the scaffold: `bodyHtml` fills the scrollable
    // body (intro -> stage -> feedback sub-regions), `actionsHtml` fills the pinned
    // footer (the primary button). A new lesson just calls this with the two slots.
    renderStep(bodyHtml, actionsHtml) {
      this.$refs.ovBody.innerHTML = bodyHtml;
      this.$refs.ovActions.innerHTML = actionsHtml || '';
      this.$refs.ovBody.scrollTop = 0;
    },

    // ---------- completion (idempotent: re-finishing never awards a 2nd star) ----------
    complete(i, text) {
      if (!this.lessons[i].completed) {
        this.lessons[i].completed = true;
        this.save();
      }
      this.overlayOpen = false;
      this.fireConfetti();
      this.rewardTitle = ['Three Jars done!', 'Magic unlocked!', 'You did it!'][i] || 'You did it!';
      this.rewardText = text;
      this.rewardOpen = true;
    },

    speech(text) {
      return `<div class="speech"><div class="mini-webo">${this.weboSvg}</div><div class="bubble">${text}</div></div>`;
    },

    // ===== LESSON 1: Three Jars =====
    lessonJars() {
      const self = this;
      let coins = 6;
      const jars = { spend: 0, save: 0, grow: 0 };
      this.renderStep(`
        <div class="lesson-intro">${this.speech("You earned <b>6 gold coins</b> for helping out! \u{1FA99} Now, where should they go? Tap a jar to drop a coin in!")}</div>
        <div class="lesson-stage">
          <div class="coins-left">Coins left: <b id="coinsLeft">6</b></div>
          <div class="jar-game">
            <div class="jar-col spend" data-j="spend"><div class="jar-big"><div class="jar-fill" style="height:0"></div></div><div class="jar-label" style="color:var(--red)">SPEND</div><div class="jar-amt" id="amt-spend">0 coins</div></div>
            <div class="jar-col save" data-j="save"><div class="jar-big"><div class="jar-fill" style="height:0"></div></div><div class="jar-label" style="color:var(--teal)">SAVE</div><div class="jar-amt" id="amt-save">0 coins</div></div>
            <div class="jar-col grow" data-j="grow"><div class="jar-big"><div class="jar-fill" style="height:0"></div></div><div class="jar-label" style="color:var(--green)">GROW</div><div class="jar-amt" id="amt-grow">0 coins</div></div>
          </div>
        </div>
        <div class="feedback info show" style="display:block">\u{1F4A1} <b>Spend</b> is for fun stuff now. <b>Save</b> is for something bigger soon. <b>Grow</b> is money that makes MORE money later!</div>
      `, `<button class="btn" id="jarDone" disabled>Drop all your coins first</button>`);

      const body = this.$refs.ovBody;
      const cl = body.querySelector('#coinsLeft');
      const btn = this.$refs.ovActions.querySelector('#jarDone');
      body.querySelectorAll('.jar-col').forEach(col => {
        col.querySelector('.jar-big').onclick = () => {
          if (coins <= 0) return;
          const j = col.dataset.j; jars[j]++; coins--;
          cl.textContent = coins;
          col.querySelector('.jar-fill').style.height = Math.min(jars[j] * 16, 100) + '%';
          body.querySelector('#amt-' + j).textContent = jars[j] + ' coins';
          if (coins === 0) { btn.disabled = false; btn.textContent = 'See what Webo thinks →'; }
        };
      });
      btn.onclick = () => {
        let msg;
        if (jars.grow >= 1 && jars.save >= 1 && jars.spend >= 1)
          msg = "Wow, you used <b>all three jars</b>! That is exactly how smart money helpers do it. A little fun, a little saved, and some set aside to grow. \u{1F31F}";
        else if (jars.spend === 6)
          msg = "Ooh, you spent it all on fun! That is okay sometimes, but if you <b>save</b> and <b>grow</b> a little too, you will have even more later. Let us remember that! \u{1F49B}";
        else
          msg = "Nice choices! The big secret is that the <b>Grow</b> jar is magic. Keep some coins there and they turn into MORE coins over time. You will see how in the next lesson! ✨";
        self.renderStep(`<div class="lesson-intro">${self.speech(msg)}</div>`, `<button class="btn" id="finJar">Finish Lesson ⭐</button>`);
        self.$refs.ovActions.querySelector('#finJar').onclick = () => self.complete(0, "You learned the 3 Jars! Webo's world just got its first jars. \u{1FAD9}");
      };
    },

    // ===== LESSON 2: Magic Penny =====
    lessonPenny() {
      const self = this;
      this.renderStep(`
        <div class="lesson-intro">${this.speech("Here is a brain-bender! \u{1F92F} Would you rather have <b>$1,000,000 today</b>... or <b>one penny</b> that <b>doubles every day</b> for 30 days? Slide to find out what the penny becomes!")}</div>
        <div class="lesson-stage">
          <div class="penny-display">
            <div class="penny-day">Day <span id="pDay">1</span></div>
            <div class="penny-val" id="pVal">$0.01</div>
            <div class="penny-vs" id="pVs">vs $1,000,000 today</div>
          </div>
          <div class="penny-bar-wrap" id="pBars"></div>
          <input type="range" min="1" max="30" value="1" id="pSlider">
        </div>
        <div class="feedback info show" style="display:block" id="pFb">Start at day 1 and slide all the way to day 30...</div>
      `, `<button class="btn" id="pDone" disabled>Slide to day 30 first</button>`);
      const root = this.$refs.ovBody;
      const bars = root.querySelector('#pBars');
      for (let i = 0; i < 30; i++) { const b = document.createElement('div'); b.className = 'penny-bar'; b.style.height = '2px'; bars.appendChild(b); }
      const barEls = [...bars.children];
      const slider = root.querySelector('#pSlider');
      const pVal = root.querySelector('#pVal'), pDay = root.querySelector('#pDay'), pFb = root.querySelector('#pFb'), pVs = root.querySelector('#pVs');
      const pDone = this.$refs.ovActions.querySelector('#pDone');
      let reached30 = false;
      const val = (d) => 0.01 * Math.pow(2, d - 1);
      const fmt = (n) => n >= 1000 ? '$' + Math.round(n).toLocaleString() : '$' + n.toFixed(2);
      function update() {
        const d = +slider.value;
        pDay.textContent = d;
        const v = val(d);
        pVal.textContent = fmt(v);
        const max = val(30);
        barEls.forEach((b, i) => { b.style.height = (i < d ? Math.max((val(i + 1) / max) * 100, 1.5) : 0.5) + '%'; });
        if (v > 1000000) { pVs.textContent = '\u{1F389} BEATS $1,000,000!'; pVal.style.color = 'var(--green)'; }
        else { pVs.textContent = 'vs $1,000,000 today'; pVal.style.color = 'var(--orange)'; }
        if (d === 30 && !reached30) {
          reached30 = true; pDone.disabled = false; pDone.textContent = 'Whoa! Finish Lesson ⭐';
          pFb.innerHTML = '\u{1F92F} The penny becomes <b>over $5 MILLION</b>! That is the magic of money <b>doubling</b> again and again. Slow at first, then HUGE. That is why we start growing money early!';
          pFb.className = 'feedback good show';
        }
      }
      slider.oninput = update; update();
      pDone.onclick = () => self.complete(1, "You discovered compound growth! A money tree just sprouted in Webo's world. \u{1F333}");
    },

    // ===== LESSON 3: Planting Seeds =====
    lessonSeeds() {
      const self = this;
      this.renderStep(`
        <div class="lesson-intro">${this.speech("Time to plant! \u{1F331} You have <b>6 seeds</b>. Tap each patch to plant one. Here is the secret: some seeds grow big, some grow slow, and some... will not grow at all. Nobody knows which! So what should we do?")}</div>
        <div class="lesson-stage">
          <div class="seed-field" id="seedField"></div>
        </div>
        <div class="feedback info show" style="display:block" id="seedFb">Plant all 6 seeds and see what happens! \u{1F33E}</div>
      `, `<button class="btn" id="seedDone" disabled>Plant all 6 seeds</button>`);
      const root = this.$refs.ovBody;
      const field = root.querySelector('#seedField');
      const outcomes = this.shuffle(['grown', 'grown', 'slow', 'grown', 'failed', 'slow']);
      let planted = 0;
      const fb = root.querySelector('#seedFb'), btn = this.$refs.ovActions.querySelector('#seedDone');
      for (let i = 0; i < 6; i++) {
        const s = document.createElement('div'); s.className = 'seed'; s.textContent = '\u{1F7EB}';
        s.onclick = () => {
          if (s.classList.contains('planted')) return;
          s.classList.add('planted');
          const o = outcomes[i];
          setTimeout(() => {
            if (o === 'grown') { s.classList.add('grown'); s.textContent = '\u{1F333}'; }
            else if (o === 'slow') { s.classList.add('slow'); s.textContent = '\u{1F331}'; }
            else { s.classList.add('failed'); s.textContent = '\u{1F342}'; }
          }, 250);
          planted++;
          if (planted === 6) {
            btn.disabled = false; btn.textContent = 'See what Webo learned →';
            fb.innerHTML = 'Look! Some grew into big trees \u{1F333}, some are still growing \u{1F331}, and one did not make it \u{1F342}.';
            fb.className = 'feedback good show';
          }
        };
        field.appendChild(s);
      }
      btn.onclick = () => {
        self.renderStep(
          `<div class="lesson-intro">${self.speech("Here is the big idea: because we planted <b>lots of different seeds</b>, it did not matter that one failed. The others still grew! \u{1F333}<br><br>Smart money helpers call this <b>not putting all your eggs in one basket</b>. Spreading out keeps you safe. You are a natural! \u{1F31F}")}</div>`,
          `<button class="btn" id="finSeed">Finish Lesson ⭐</button>`
        );
        self.$refs.ovActions.querySelector('#finSeed').onclick = () => self.complete(2, "You learned to spread things out! Webo's rocket is fueled and ready. \u{1F680}");
      };
    },

    // ===== LESSON 4: Needs vs Wants =====
    lessonNeeds() {
      const self = this;
      const items = this.shuffle([
        { emoji: '\u{1F34E}', name: 'an apple',       need: true,  why: 'our bodies need food to grow strong' },
        { emoji: '\u{1F9F8}', name: 'a teddy bear',    need: false, why: 'toys are fun, but we can live without them' },
        { emoji: '\u{1F3E0}', name: 'a home',          need: true,  why: 'everyone needs a safe place to live' },
        { emoji: '\u{1F36C}', name: 'candy',           need: false, why: 'it is yummy to want, but not something we need' },
        { emoji: '\u{1F9E5}', name: 'a warm coat',     need: true,  why: 'we need warm clothes when it is cold' },
        { emoji: '\u{1F3AE}', name: 'a video game',    need: false, why: 'it is fun to want, not a need' },
      ]);
      let score = 0;

      const card = (i) => {
        const it = items[i];
        const isLast = i === items.length - 1;
        self.renderStep(`
          <div class="lesson-intro">${self.speech("Some things we <b>need</b> to live, and some are just nice to <b>want</b>. Tap the right basket for each one! \u{1F9FA}")}</div>
          <div class="lesson-stage">
            <div class="nw-progress">Item <b>${i + 1}</b> of ${items.length}</div>
            <div class="nw-item">${it.emoji}<div class="nw-name">${it.name}</div></div>
            <div class="nw-choices">
              <button class="choice nw-need" data-need="true">\u{2705} Need</button>
              <button class="choice nw-want" data-need="false">\u{2728} Want</button>
            </div>
            <div class="feedback" id="nwFb"></div>
          </div>
        `, `<button class="btn" id="nwNext" disabled>Pick Need or Want</button>`);

        const body = self.$refs.ovBody;
        const fb = body.querySelector('#nwFb');
        const next = self.$refs.ovActions.querySelector('#nwNext');
        body.querySelectorAll('.nw-choices .choice').forEach((b) => {
          b.onclick = () => {
            const chose = b.dataset.need === 'true';
            body.querySelectorAll('.nw-choices .choice').forEach((x) => { x.disabled = true; });
            body.querySelector(it.need ? '.nw-need' : '.nw-want').classList.add('correct');
            const name = it.name.charAt(0).toUpperCase() + it.name.slice(1);
            if (chose === it.need) {
              score++;
              fb.innerHTML = `Yes! \u{1F31F} ${name} is a <b>${it.need ? 'need' : 'want'}</b> because ${it.why}.`;
              fb.className = 'feedback good show';
            } else {
              b.classList.add('wrong');
              fb.innerHTML = `Good thinking! Actually ${it.name} is a <b>${it.need ? 'need' : 'want'}</b> because ${it.why}.`;
              fb.className = 'feedback info show';
            }
            next.disabled = false;
            next.textContent = isLast ? 'See what Webo thinks →' : 'Next →';
          };
        });
        next.onclick = () => {
          if (!isLast) { card(i + 1); return; }
          self.renderStep(
            `<div class="lesson-intro">${self.speech(`Awesome sorting! \u{1F9FA} You got <b>${score} of ${items.length}</b>. The big idea: <b>needs come first</b> (food, a home, warm clothes), then we can choose <b>wants</b> with what is left. \u{1F49B}`)}</div>`,
            `<button class="btn" id="nwFin">Finish Lesson ⭐</button>`
          );
          self.$refs.ovActions.querySelector('#nwFin').onclick = () => self.complete(3, "You learned needs vs wants! A basket of goodies appeared in Webo's world. \u{1F9FA}");
        };
      };
      card(0);
    },

    shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; },

    // ---------- hero Webo tap (cosmetic) ----------
    tapWebo(el) {
      const hints = ["Money grows when you are patient! \u{1F331}", "Three jars: Spend, Save, Grow! \u{1FAD9}", "Tiny coins become BIG over time! ✨", "Spread your seeds around! \u{1F333}", "You are doing great, buddy! \u{1F49B}"];
      this.hint = hints[Math.floor(Math.random() * hints.length)];
      el.animate([{ transform: 'translateY(0) scale(1)' }, { transform: 'translateY(-12px) scale(1.06)' }, { transform: 'translateY(0) scale(1)' }], { duration: 500, easing: 'ease-out' });
    },

    fireConfetti() {
      const colors = ['#f5a623', '#4fd1c5', '#5ed47a', '#ff7b6b', '#9d7bea', '#ffb938'];
      for (let i = 0; i < 40; i++) {
        const c = document.createElement('div'); c.className = 'confetti';
        c.style.left = Math.random() * 100 + '%';
        c.style.background = colors[i % colors.length];
        c.style.transform = 'rotate(' + Math.random() * 360 + 'deg)';
        document.body.appendChild(c);
        const fall = 600 + Math.random() * 700;
        c.animate([{ transform: `translateY(0) rotate(0)`, opacity: 1 }, { transform: `translateY(${window.innerHeight + 40}px) rotate(${Math.random() * 720}deg)`, opacity: .2 }], { duration: fall + 1400, easing: 'cubic-bezier(.3,.6,.5,1)' });
        setTimeout(() => c.remove(), fall + 1500);
      }
    },

    // ================= ASK WEBO (server-proxied Claude) =================
    openChat() {
      this.chatOpen = true;
      if (this.messages.length === 0) {
        this.messages.push({ who: 'bot', html: "Hi there! I'm Webo \u{1F916} Ask me ANYTHING about money and I'll explain it in a fun way. What do you want to know?" });
      }
      this.$nextTick(() => { const i = document.querySelector('.chat-input input'); if (i) i.focus(); });
    },

    scrollChat() { this.$nextTick(() => { const log = this.$refs.chatLog; if (log) log.scrollTop = log.scrollHeight; }); },

    async sendChat(preset) {
      const text = (preset !== undefined ? preset : this.chatInput).trim();
      if (!text || this.chatBusy) return;
      this.chatInput = '';
      this.messages.push({ who: 'me', html: this.escapeHtml(text) });
      this.chatHistory.push({ role: 'user', content: text });
      this.chatBusy = true;
      this.scrollChat();
      try {
        const res = await fetch('/api/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          // send only the recent turns for context; the server holds the system prompt + key
          body: JSON.stringify({ messages: this.chatHistory.slice(-12) }),
        });
        const data = await res.json().catch(() => ({}));
        const reply = (data && typeof data.reply === 'string' && data.reply.trim())
          ? data.reply.trim()
          : "Hmm, my circuits got a little fuzzy! \u{1F916} Try asking me again!";
        this.messages.push({ who: 'bot', html: this.escapeHtml(reply).replace(/\n/g, '<br>') });
        this.chatHistory.push({ role: 'assistant', content: reply });
      } catch (e) {
        this.messages.push({ who: 'bot', html: "Oops, my antenna lost signal! \u{1F4E1} Ask me again in a moment!" });
      }
      this.chatBusy = false;
      this.scrollChat();
    },

    escapeHtml(s) { return String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); },
  };
}
</script>
</body>
</html>
